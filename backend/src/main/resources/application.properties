spring.application.name=backend
server.port=9090


# h2-database connection
spring.datasource.url=jdbc:h2:mem:acquirex
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=username
spring.datasource.password=username

# web console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false


# jpa / hibernate
# update automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Custom path to access the Swagger UI
springdoc.swagger-ui.path=/acquirerx-docs
# Order the endpoints by HTTP method (GET, POST, etc.)
springdoc.swagger-ui.operationsSorter=method

security.jwt.secret=MySuperSecretKeyMySuperSecretKey123456
security.jwt.access-ttl=3600

# Dev-only explicit credentials to avoid generated default password warning
# spring.security.user.name=devuser
# spring.security.user.password=devpass123
